<div class="endereco-wrapper">
  <div class="endereco-container">
    <div class="endereco-card">
      <div class="endereco-header">
        <h1>📍 Registre seu Endereço de Casa</h1>
        <p>Precisamos do seu endereço para realizar entregas</p>
      </div>

      @if (mensagem()) {
        <div [class]="tipoMensagem() === 'sucesso' ? 'msg-sucesso' : 'msg-erro'">
          {{ mensagem() }}
        </div>
      }

      <form (ngSubmit)="salvarEndereco()" class="endereco-form">
        <div class="form-group">
          <label for="rua">Rua:</label>
          <input
            type="text"
            id="rua"
            [(ngModel)]="endereco().rua"
            name="rua"
            placeholder="Digite o nome da rua"
            [disabled]="carregando()"
            required
          >
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="numero">Número:</label>
            <input
              type="text"
              id="numero"
              [(ngModel)]="endereco().numero"
              name="numero"
              placeholder="Ex: 123"
              [disabled]="carregando()"
              required
            >
          </div>
          <div class="form-group">
            <label for="bairro">Bairro:</label>
            <input
              type="text"
              id="bairro"
              [(ngModel)]="endereco().bairro"
              name="bairro"
              placeholder="Digite o bairro"
              [disabled]="carregando()"
              required
            >
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="cidade">Cidade:</label>
            <input
              type="text"
              id="cidade"
              [(ngModel)]="endereco().cidade"
              name="cidade"
              placeholder="Digite a cidade"
              [disabled]="carregando()"
              required
            >
          </div>
          <div class="form-group">
            <label for="estado">Estado:</label>
            <input
              type="text"
              id="estado"
              [(ngModel)]="endereco().estado"
              name="estado"
              placeholder="Ex: SP"
              [disabled]="carregando()"
              required
              maxlength="2"
            >
          </div>
        </div>

        <div class="form-group">
          <label for="cep">CEP:</label>
          <input
            type="text"
            id="cep"
            [(ngModel)]="endereco().cep"
            name="cep"
            placeholder="Ex: 01310-100"
            [disabled]="carregando()"
            required
          >
        </div>

        <div class="form-acoes">
          <button type="submit" class="btn-salvar" [disabled]="carregando()">
            @if (carregando()) { Salvando... } @else { ✅ Registrar Endereço }
          </button>
          <button type="button" (click)="irParaCardapio()" class="btn-pular">
            ⏭️ Pular por Enquanto
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
